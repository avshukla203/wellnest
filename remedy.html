<!DOCTYPE html>
<html>
<head>
<title>Healthcare+</title>
<link rel="stylesheet" href="style.css">

<style>
body {
  background:#0f172a;
  color:white;
  font-family:Segoe UI;
}

/* HEADER */
.header {
  padding:20px;
}

/* SEARCH */
.search-box {
  padding:10px;
  width:250px;
  border-radius:8px;
  border:none;
}

/* SCROLL ROW */
.scroll {
  display:flex;
  overflow-x:auto;
  gap:15px;
  padding:15px;
}

.scroll::-webkit-scrollbar {
  display:none;
}

/* CARD */
.card {
  min-width:220px;
  background:#1e293b;
  padding:15px;
  border-radius:12px;
  transition:0.3s;
  cursor:pointer;
}

.card:hover {
  transform:scale(1.08);
  background:#334155;
}

/* MODAL */
.modal {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.7);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-content {
  background:white;
  color:black;
  padding:20px;
  border-radius:15px;
  width:60%;
}

/* ANIMATION */
.fade {
  animation:fade 0.5s;
}
@keyframes fade {
  from{opacity:0} to{opacity:1}
}
</style>

</head>

<body>

<div class="header">
<h1>🏥 Disease Explorer</h1>
<input class="search-box" id="search" placeholder="Search..." onkeyup="searchDisease()">
</div>

<!-- COMMON -->
<h2>🩺 Common Conditions</h2>
<div class="scroll">

<div class="card" onclick="openModal('Fever')">Fever</div>
<div class="card" onclick="openModal('Cold')">Cold</div>
<div class="card" onclick="openModal('Cough')">Cough</div>

</div>

<!-- THROAT -->
<h2>😷 Throat</h2>
<div class="scroll">

<div class="card" onclick="openModal('Sore Throat')">Sore Throat</div>
<div class="card" onclick="openModal('Tonsillitis')">Tonsillitis</div>

</div>

<!-- GUT -->
<h2>🤢 Digestive</h2>
<div class="scroll">

<div class="card" onclick="openModal('Acidity')">Acidity</div>
<div class="card" onclick="openModal('Diarrhea')">Diarrhea</div>
<div class="card" onclick="openModal('Gas')">Gas</div>

</div>

<!-- PERIOD -->
<h2>🩸 Period Related</h2>
<div class="scroll">

<div class="card" onclick="openModal('Cramps')">Cramps</div>
<div class="card" onclick="openModal('Irregular Periods')">Irregular Periods</div>

</div>

<!-- SERIOUS -->
<h2>❤️ Serious Diseases</h2>
<div class="scroll">

<div class="card" onclick="openModal('Heart Disease')">Heart Disease</div>
<div class="card" onclick="openModal('Stroke')">Stroke</div>
<div class="card" onclick="openModal('Cancer')">Cancer</div>
<div class="card" onclick="openModal('Diabetes')">Diabetes</div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-content fade">
<h2 id="title"></h2>
<p id="info"></p>
<button onclick="closeModal()">Close</button>
</div>
</div>

<script>

/* DATA */
function getData(d){

let data = {
"Fever":"Drink fluids, rest, take light food.",
"Cold":"Ginger tea, steam inhalation, honey.",
"Cough":"Honey + ginger, warm water.",
"Sore Throat":"Salt water gargle, honey tea.",
"Tonsillitis":"Warm liquids, rest.",
"Acidity":"Cold milk, avoid spicy food.",
"Gas":"Ajwain, warm water.",
"Diarrhea":"ORS, hydration.",
"Cramps":"Heating pad, light exercise.",
"Irregular Periods":"Healthy diet, reduce stress.",

"Heart Disease":"⚠️ Serious condition. Maintain diet, exercise, consult doctor.",
"Stroke":"⚠️ Emergency condition. Immediate medical help required.",
"Cancer":"⚠️ Requires professional treatment. No home remedy.",
"Diabetes":"Healthy diet, control sugar, exercise."
};

return data[d] || "Consult doctor";
}

/* OPEN MODAL */
function openModal(name){
document.getElementById("modal").style.display="flex";
document.getElementById("title").innerText=name;
document.getElementById("info").innerText=getData(name);
}

/* CLOSE */
function closeModal(){
document.getElementById("modal").style.display="none";
}

/* SEARCH */
function searchDisease(){
let input=document.getElementById("search").value.toLowerCase();
let cards=document.querySelectorAll(".card");

cards.forEach(c=>{
c.style.display = c.innerText.toLowerCase().includes(input) ? "block":"none";
});
}

</script>

</body>
</html>
